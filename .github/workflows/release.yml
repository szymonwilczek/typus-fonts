name: Release Fonts

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fonttools

      - name: Download source JetBrains Mono Nerd Font
        run: |
          mkdir -p jetbrains-mono-src
          curl -sL https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz -o JetBrainsMono.tar.xz
          tar -xf JetBrainsMono.tar.xz -C jetbrains-mono-src

      - name: Build Typus Mono Fonts
        run: |
          chmod +x build.sh
          ./build.sh jetbrains-mono-src

      - name: Package Fonts into ZIP
        run: |
          cd fonts
          zip -r ../TypusMono-${{ github.ref_name }}.zip *.ttf
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: TypusMono-${{ github.ref_name }}.zip
          name: Release ${{ github.ref_name }}
          body: |
            Custom-compiled, spacing-only condensed variant of JetBrains Mono.
            
            Included spacing options in this release:
            - **Typus Mono 90** (90% width spacing)
            - **Typus Mono 92** (92% width spacing)
            - **Typus Mono 95** (95% width spacing)
            
            All variants include Thin, Light, Regular, SemiBold, and Bold weights (along with their italics) with shifted weight mappings optimized for FreeType/Emacs GUI rendering.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
